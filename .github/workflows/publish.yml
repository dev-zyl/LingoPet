name: "Publish Release"

on:
  push:
    tags:
      - "v*" # 当你推送以 v 开头的 tag 时触发（例如 v1.0.0）

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "x86_64-apple-darwin"
            args: "--target x86_64-apple-darwin --bundles dmg,app"
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            args: "--target aarch64-apple-darwin --bundles dmg,app"
          - platform: "windows-latest"
            target: ""
            args: "--bundles nsis,msi"

    runs-on: ${{ matrix.platform }}
    env:
      # Forks must configure these repository secrets before publishing signed updater artifacts.
      # Regular local builds (`npm run build`, `cargo check`) do not require these secrets.
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Install Frontend Dependencies
        run: npm ci || npm install

      - name: Validate updater signing key
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY repository secret. Set it to the contents of the local updater private key file."
            exit 1
          fi

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # 自动读取并替换为 package.json 中的版本号
          releaseName: "LingoPet v__VERSION__"
          releaseBody: |
            LingoPet 灵动宠物桌面宠物自动构建发布版本。

            macOS 提示“已损坏，无法打开”时，通常是因为应用尚未签名和 Apple 公证。临时解决：将 LingoPet.app 拖到“应用程序”后，在终端执行：
            ```bash
            xattr -cr /Applications/LingoPet.app
            ```
            然后再次打开应用。
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload macOS updater compatibility aliases
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"

          case "$MATRIX_TARGET" in
            "aarch64-apple-darwin")
              SOURCE_NAME="LingoPet_aarch64.app.tar.gz"
              ALIAS_NAME="LingoPet_${VERSION}_aarch64.app.tar.gz"
              ;;
            "x86_64-apple-darwin")
              SOURCE_NAME="LingoPet_x64.app.tar.gz"
              ALIAS_NAME="LingoPet_${VERSION}_x64.app.tar.gz"
              ;;
            *)
              echo "No macOS updater alias rule for target: $MATRIX_TARGET"
              exit 0
              ;;
          esac

          SOURCE_PATH="$(find src-tauri/target -name "$SOURCE_NAME" -type f | head -n 1)"
          SIG_PATH="$(find src-tauri/target -name "$SOURCE_NAME.sig" -type f | head -n 1)"

          if [ -z "$SOURCE_PATH" ] || [ -z "$SIG_PATH" ]; then
            echo "::error::Missing macOS updater artifact or signature for $SOURCE_NAME"
            exit 1
          fi

          TMP_DIR="$(mktemp -d)"
          cp "$SOURCE_PATH" "$TMP_DIR/$ALIAS_NAME"
          cp "$SIG_PATH" "$TMP_DIR/$ALIAS_NAME.sig"

          gh release upload "$TAG" "$TMP_DIR/$ALIAS_NAME" "$TMP_DIR/$ALIAS_NAME.sig" --clobber
