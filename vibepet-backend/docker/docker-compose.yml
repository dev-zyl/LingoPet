version: '3.8'

services:
  # 1. Redis 缓存服务 (限制最大内存 128MB，采用 LRU 过期策略，保障 2G 内存服务器的安全)
  pet-redis:
    image: redis:7.0-alpine
    container_name: pet-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD before startup} --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    restart: always
    networks:
      - pet-network

  # 2. MySQL 数据库服务 (限制 InnoDB 缓冲池大小，防爆物理内存)
  pet-mysql:
    image: mysql:8.0
    container_name: pet-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD before startup}
      MYSQL_DATABASE: vibepet_db
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d # 挂载 SQL 脚本，容器启动时自动初始化表结构
    command: 
      - --default-authentication-plugin=mysql_native_password
      - --innodb-buffer-pool-size=256M # 2G 内存服务器的黄金配置
      - --max-connections=100
    restart: always
    networks:
      - pet-network

  # 3. 极轻量 Spring Boot 后端服务
  pet-backend:
    image: eclipse-temurin:17-jre-alpine
    container_name: pet-backend
    ports:
      - "8080:8080"
    volumes:
      - ../target/vibepet-backend-1.0.0.jar:/app.jar # 挂载打包好的 jar 文件
      - ./images:/images # 图片持久化存储挂载目录，直接映射到外部，供 CDN 快速读取
    # 限制 JVM 启动堆内存，防止 Java 撑爆系统内存
    entrypoint: ["java", "-Xms128m", "-Xmx384m", "-jar", "/app.jar"]
    depends_on:
      - pet-mysql
      - pet-redis
    restart: always
    networks:
      - pet-network

networks:
  pet-network:
    driver: bridge
