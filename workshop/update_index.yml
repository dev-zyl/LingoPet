# VibePet 创意工坊自动生成全局索引工作流
# 
# 部署说明：
# 在你的 GitHub 创意工坊仓库根目录下，新建路径 .github/workflows/update_index.yml
# 将本文件放入创意工坊数据仓库的 .github/workflows/update_index.yml。

name: Update Workshop Global Index

on:
  push:
    paths:
      - 'patches/**/*.json' # 仅当有新的或更新的动作 JSON 配置提交时触发
      - '!patches/index.json' # 排除索引自身，防止死循环触发
  workflow_dispatch: # 允许在 GitHub Action 页面手动一键触发运行

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write # 授予 Action 自动提交并 push 的权限

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Generate index.json
      run: |
        node -e '
        const fs = require("fs");
        const path = require("path");

        const patchesDir = path.join(process.cwd(), "patches");
        if (!fs.existsSync(patchesDir)) {
          console.log("No patches folder found.");
          fs.writeFileSync(path.join(patchesDir, "index.json"), "[]");
          process.exit(0);
        }

        const listAllJsonFiles = (dir, filesList = []) => {
          const files = fs.readdirSync(dir);
          for (const file of files) {
            const filePath = path.join(dir, file);
            const stat = fs.statSync(filePath);
            if (stat.isDirectory()) {
              listAllJsonFiles(filePath, filesList);
            } else if (file.endsWith(".json") && file !== "index.json") {
              filesList.push(filePath);
            }
          }
          return filesList;
        };

        try {
          const jsonFiles = listAllJsonFiles(patchesDir);
          const indexData = [];

          for (const file of jsonFiles) {
            const rawContent = fs.readFileSync(file, "utf8");
            try {
              const parsed = JSON.parse(rawContent);
              // 补充相对路径供 CDN 使用，客户端会动态组装 cdn url
              const relativePath = path.relative(process.cwd(), file).replace(/\\/g, "/");
              indexData.push({
                ...parsed,
                metaPath: relativePath
              });
            } catch (err) {
              console.error("Failed to parse file: " + file, err);
            }
          }

          // 按照创建时间或降序排列最新动作在最前
          indexData.sort((a, b) => new Date(b.createdTime || 0) - new Date(a.createdTime || 0));

          const indexPath = path.join(patchesDir, "index.json");
          fs.writeFileSync(indexPath, JSON.stringify(indexData, null, 2));
          console.log(`Successfully generated index.json with ${indexData.length} actions.`);
        } catch (e) {
          console.error("Error generating index", e);
          process.exit(1);
        }
        '

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add patches/index.json
        # 仅在文件有变化时提交，防报错
        git diff-index --quiet HEAD || git commit -m "chore: auto-update global workshop index [skip ci]"
        git push
